{% load static %}

<div class="question">
    <div class="row">
        <div class="col-2">
            <div class="row">
                <div class="col-3"></div>
                <div class="col-9">
                    <div class="avatar frame-sm">
                        <img src="{% static "img/avatar-1.jpg" %}" alt=""/>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-10">
            <h3 class="question-title"><a href="{% url "question" question.question_id %}">{{ question.name }}</a></h3>
            <!--                            lorem20-->
            <div class="question-text">
                {{ question.description }}
            </div>
        </div>
    </div>
</div>
